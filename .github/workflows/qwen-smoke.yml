name: qwen-smoke

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY || secrets.OPENAI_API_KEY }}
      QWEN_BASE_URL: ${{ vars.QWEN_BASE_URL || vars.OPENAI_BASE_URL || 'https://coding.dashscope.aliyuncs.com/v1' }}
      QWEN_MODEL: ${{ vars.QWEN_MODEL || vars.OPENAI_MODEL || 'qwen3.7-plus' }}
    steps:
      - name: Test Qwen chat completion
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${QWEN_API_KEY:-}" ]; then
            echo "::error::QWEN_API_KEY is empty"
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          endpoint = os.environ["QWEN_BASE_URL"].rstrip("/") + "/chat/completions"
          body = {
              "model": os.environ.get("QWEN_MODEL", "qwen3.7-plus"),
              "temperature": 0,
              "max_tokens": 8,
              "messages": [
                  {"role": "system", "content": "Reply with OK only."},
                  {"role": "user", "content": "Say OK."},
              ],
          }
          request = urllib.request.Request(
              endpoint,
              data=json.dumps(body).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"Bearer {os.environ['QWEN_API_KEY']}",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=60) as response:
                  payload = json.loads(response.read().decode("utf-8"))
                  content = payload.get("choices", [{}])[0].get("message", {}).get("content", "")
                  print(f"Qwen smoke status: {response.status}")
                  print(f"Qwen smoke content length: {len(content.strip())}")
                  if not content.strip():
                      print("::error::Qwen returned empty content")
                      sys.exit(1)
          except urllib.error.HTTPError as error:
              raw = error.read().decode("utf-8", errors="replace")
              print(f"::error::Qwen smoke request failed: HTTP {error.code}: {raw[:500]}")
              sys.exit(1)
          PY
