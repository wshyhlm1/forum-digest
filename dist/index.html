<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=https://wshyhlm1.github.io/forum-digest/batches/2026-07-13/">
  <title>AI/科技论坛日报</title>
  <style>
  :root {
    --bg: #f6f7f4;
    --paper: #ffffff;
    --ink: #202124;
    --muted: #687076;
    --line: #d9ded8;
    --accent: #c24f18;
    --accent-soft: #fff1e8;
    --blue: #255f85;
    --green: #276749;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    line-height: 1.62;
  }
  .page {
    width: min(980px, 100%);
    margin: 0 auto;
    padding: 18px 14px 72px;
  }
  .topbar, .section {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .topbar h1 {
    margin: 0;
    font-size: 1.5rem;
    line-height: 1.25;
  }
  .subtitle, .original-title, .muted, .reason {
    color: var(--muted);
  }
  .subtitle, .original-title {
    margin: 6px 0 0;
  }
  .source-chip {
    display: inline-block;
    margin-bottom: 8px;
    color: var(--blue);
    font-weight: 700;
  }
  .meta-line, .card-kicker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 12px;
    margin-top: 8px;
    color: var(--muted);
    font-size: 0.88rem;
  }
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .btn {
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    border-radius: 6px;
    padding: 7px 11px;
    font-size: 0.9rem;
    text-decoration: none;
    cursor: pointer;
    line-height: 1.2;
  }
  .btn.secondary {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .back-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.9rem;
  }
  .source-section {
    margin-top: 18px;
  }
  .source-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
    border-bottom: 2px solid var(--line);
  }
  .source-header h2, .section h2 {
    margin: 0 0 8px;
    font-size: 1.08rem;
  }
  .section h3 {
    margin: 14px 0 6px;
    font-size: 1rem;
  }
  .story-list {
    display: grid;
    gap: 10px;
  }
  .story-card {
    display: grid;
    grid-template-columns: 46px 1fr;
    gap: 10px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
  }
  .rank {
    color: var(--green);
    font-weight: 700;
  }
  .story-card h3 {
    margin: 4px 0 0;
    font-size: 1.04rem;
    line-height: 1.35;
  }
  .story-card h3 a {
    color: var(--ink);
    text-decoration: none;
  }
  .story-card h3 a:hover {
    text-decoration: underline;
  }
  .summary-preview {
    margin: 8px 0 0;
  }
  .compact-list ul, .section ul {
    margin: 8px 0 0;
    padding-left: 20px;
  }
  .compact-list li + li, .section li + li {
    margin-top: 4px;
  }
  .post-body, .comment-text {
    overflow-wrap: anywhere;
  }
  .post-body code, .comment-text code {
    background: #eef1ef;
    padding: 1px 4px;
    border-radius: 4px;
  }
  .post-body pre, .comment-text pre {
    overflow-x: auto;
    padding: 10px;
    border-radius: 6px;
    background: #202124;
    color: #f6f7f4;
  }
  .comment-tree {
    display: grid;
    gap: 8px;
  }
  .comment-node {
    border-left: 2px solid var(--line);
    padding-left: 10px;
  }
  .comment-node.depth-2 { border-left-color: #adc7ba; }
  .comment-node.depth-3, .comment-node.depth-4 { border-left-color: #95afc0; }
  .comment-node > summary {
    cursor: pointer;
    color: var(--muted);
    font-size: 0.88rem;
  }
  .comment-body {
    padding: 8px 0 4px;
  }
  .comment-children {
    display: grid;
    gap: 8px;
    margin-top: 8px;
  }
  .badge, .count {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 1px 7px;
    color: var(--muted);
    font-size: 0.78rem;
  }
  .empty-source {
    background: var(--paper);
    border: 1px dashed var(--line);
    border-radius: 8px;
    padding: 12px;
  }
  .is-hidden { display: none; }
  .redirect-page {
    min-height: 65vh;
    display: grid;
    place-content: center;
    gap: 10px;
    text-align: center;
  }
  @media (max-width: 640px) {
    .story-card {
      grid-template-columns: 1fr;
    }
    .rank {
      margin-bottom: -4px;
    }
  }
  </style>
</head>
<body>
  <main class="page redirect-page">
    <h1>正在打开最新日报</h1>
    <a class="btn" href="https://wshyhlm1.github.io/forum-digest/batches/2026-07-13/">https://wshyhlm1.github.io/forum-digest/batches/2026-07-13/</a>
  </main>
</body>
</html>
